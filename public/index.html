<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>__BRAND_PAGE_TITLE__</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --accent-start: __BRAND_PRIMARY__;
            --accent-end: __BRAND_SECONDARY__;
            --accent-gradient: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            --accent-rgb: __BRAND_RGB__;
        }

        * {
            font-family: 'Inter', sans-serif;
        }

        .logo-img {
            max-height: 130px;
            width: auto;
        }

        body {
            position: relative;
            overflow-x: hidden;
            background: linear-gradient(180deg, #0a0b0d 0%, #151720 100%);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            __BRAND_BG_CSS__
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.65;
            filter: blur(__BRAND_BG_BLUR__);
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }

        .accent-gradient {
            background: var(--accent-gradient);
        }

        .glass-card {
            background: rgba(30, 33, 42, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(var(--accent-rgb), 0.15);
            transition: all 0.2s ease;
        }

        .glass-card:hover {
            border-color: rgba(var(--accent-rgb), 0.25);
            box-shadow: 0 8px 32px rgba(var(--accent-rgb), 0.1);
        }

        input:focus,
        textarea:focus {
            border-color: rgba(var(--accent-rgb), 0.4) !important;
            box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.1) !important;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(var(--accent-rgb), 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .brand-logo-wrap {
            __BRAND_LOGO_WRAP_CSS__
        }
    </style>
</head>

<body class="min-h-screen bg-slate-900">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md">
            <div class="glass-card rounded-2xl shadow-2xl p-8">
                <div class="p-8">
                    <div class="flex flex-col items-center mb-8">
                        <a id="returnSiteBtn" href="__BRAND_REDIRECT__" target="_blank" rel="noopener noreferrer"
                            class="flex items-center gap-1.5 mb-5 px-4 py-1.5 rounded-full text-xs font-semibold text-slate-900 transition-all duration-200 hover:-translate-y-0.5"
                            style="background: var(--accent-gradient); box-shadow: 0 2px 12px rgba(var(--accent-rgb),0.35);">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                            </svg>
                            <span id="backBtnText">__BRAND_BACK_BTN__</span>
                        </a>
                        __BRAND_LOGO_TAG__
                        <h1 id="formTitle" class="text-2xl font-semibold text-white mb-1">__BRAND_FORM_TITLE__</h1>
                        <p id="formSubtitle" class="text-sm text-slate-400">__BRAND_FORM_SUBTITLE__</p>
                    </div>


                    <form id="requestForm" class="space-y-4">
                        <div class="space-y-2">
                            <label for="name" class="text-sm font-medium text-slate-300">İsim Soyisim</label>
                            <input type="text" id="name" name="name" required placeholder="Ad Soyad"
                                class="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-md text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition">
                        </div>

                        <div class="space-y-2">
                            <label for="username" class="text-sm font-medium text-slate-300">Kullanıcı Adı</label>
                            <input type="text" id="username" name="username" required placeholder="kullaniciadi"
                                class="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-md text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition">
                        </div>

                        <div class="space-y-2">
                            <label for="phone" class="text-sm font-medium text-slate-300">Telefon Numarası</label>
                            <div class="relative flex items-center">
                                <div class="absolute left-3 flex items-center gap-2 pointer-events-none">
                                    <img src="amblem.png" alt="TR" class="h-3.5 w-auto">
                                    <span class="text-slate-400 text-sm">+90</span>
                                </div>
                                <input type="tel" id="phone" name="phone" required placeholder="5XX XXX XX-XX"
                                    maxlength="15"
                                    class="w-full pl-24 pr-3 py-2 bg-slate-900 border border-slate-600 rounded-md text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition">
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label for="message" class="text-sm font-medium text-slate-300">Mesaj</label>
                            <textarea id="message" name="message" rows="3" required placeholder="Mesajınız..."
                                class="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-md text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition resize-none"></textarea>
                        </div>

                        <button type="submit" id="submitBtn"
                            class="w-full accent-gradient text-slate-900 font-semibold py-3 px-4 rounded-lg transition-all duration-200 ease-out focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 disabled:opacity-50 disabled:cursor-not-allowed"
                            style="box-shadow: 0 4px 16px rgba(var(--accent-rgb), 0.2);">
                            <span class="btn-text" id="submitBtnText">__BRAND_BTN_TEXT__</span>
                            <svg class="btn-loader animate-spin h-5 w-5 text-white hidden"
                                xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                </path>
                            </svg>
                        </button>
                    </form>

                    <div id="successMessage" class="hidden text-center py-8">
                        <div
                            class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-500/20 mb-4">
                            <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M5 13l4 4L19 7"></path>
                            </svg>
                        </div>
                        <h3 class="text-lg font-semibold text-white mb-1">Talebiniz Alındı!</h3>
                        <p class="text-sm text-slate-400">En kısa sürede size ulaşacağız.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>window.ALLOWED_ORIGIN = "__ALLOWED_ORIGIN__";</script>
    <script src="app.js"></script>
</body>

</html>
